name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        run: pytest

  postman:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Start backend
        run: uvicorn backend.main:app --host 0.0.0.0 --port 8000 &

      - name: Wait for backend
        run: |
          for i in {1..10}; do
            curl -s http://localhost:8000/ && break
            sleep 2
          done

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman tests
        run: newman run tests/Main_API_Tests.postman_collection.json

  build:
    runs-on: ubuntu-latest
    needs: [test, postman]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f backend/Dockerfile -t equitygauge-backend .

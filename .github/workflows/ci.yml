name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        run: pytest

  postman:
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: equitygauge
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: equitygauge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://equitygauge:secret@localhost:5432/equitygauge

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Start backend
        run: uvicorn backend.main:app --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000/ > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Attempt $i: Waiting for backend..."
            sleep 1
          done
          echo "Backend failed to start"
          cat /tmp/backend.log
          exit 1

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman tests
        run: newman run tests/Main_API_Tests.postman_collection.json --env-var "baseUrl=http://localhost:8000" --env-var "ticker=AAPL" --env-var "test_ticker=TEST"

  build:
    runs-on: ubuntu-latest
    needs: [test, postman]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f backend/Dockerfile -t equitygauge-backend .
